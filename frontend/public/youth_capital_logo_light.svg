<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" width="320" height="90">

  <!-- ===== PILLAR ===== -->
  <!-- Star -->
  <polygon points="40,5 42.2,12 49.5,12 43.8,16.2 46,23 40,18.8 34,23 36.2,16.2 30.5,12 37.8,12" fill="#C9A84C"/>

  <!-- Top plate -->
  <rect x="29" y="24" width="22" height="5" rx="1.5" fill="#C9A84C"/>

  <!-- Column body -->
  <rect x="31" y="29" width="18" height="38" rx="1" fill="#1B2A4A"/>
  <!-- Groove lines -->
  <rect x="33.5" y="29" width="2.5" height="38" fill="#0D1828" opacity="0.35"/>
  <rect x="38.5" y="29" width="2.5" height="38" fill="#0D1828" opacity="0.35"/>
  <rect x="43.5" y="29" width="2.5" height="38" fill="#0D1828" opacity="0.35"/>

  <!-- Base plate 1 -->
  <rect x="27" y="67" width="26" height="5" rx="1.5" fill="#C9A84C"/>
  <!-- Base plate 2 -->
  <rect x="22" y="72" width="36" height="6" rx="2" fill="#C9A84C" opacity="0.7"/>

  <!-- ===== VERTICAL DIVIDER ===== -->
  <line x1="72" y1="10" x2="72" y2="78" stroke="#C9A84C" stroke-width="1.2"/>

  <!-- ===== TEXT ===== -->
  <!-- YOUTH -->
  <text
    x="88"
    y="50"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="30"
    fill="#1B2A4A"
    letter-spacing="3"
  >YOUTH</text>

  <!-- CAPITAL -->
  <text
    x="90"
    y="68"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="11"
    fill="#C9A84C"
    letter-spacing="7"
  >CAPITAL</text>

</svg>
