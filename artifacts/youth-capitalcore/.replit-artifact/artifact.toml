kind = "web"
previewPath = "/"
title = "Youth CapitalCore"
version = "1.0.0"
id = "artifacts/youth-capitalcore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19685

[services.development]
run = "pnpm --filter @workspace/youth-capitalcore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/youth-capitalcore", "run", "build" ]
publicDir = "artifacts/youth-capitalcore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19685"
BASE_PATH = "/"
